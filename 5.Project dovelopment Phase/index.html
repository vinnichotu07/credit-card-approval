<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Portal</title>
    <style>
        :root {
            --primary: #008cff;
            --primary-hover: #006ec9;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #334155;
            --text-light: #64748b;
            --border: #cbd5e0;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 850px;
            background: var(--card-bg);
            margin: 0 auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-top: 8px solid var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .header h2 {
            color: #1a365d;
            margin: 0 0 10px 0;
            font-size: 28px;
        }

        .header p {
            color: var(--text-light);
            margin: 0;
            font-size: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            font-size: 12px;
            color: #4a5568;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        select, input {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
            background-color: #fff;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 140, 255, 0.15);
        }

        .btn-container {
            grid-column: span 2;
            margin-top: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }

        /* The Beautiful Dynamic Result Panel */
        #result-card {
            display: none;
            grid-column: span 2;
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .status-loading { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e0; }
        .status-approved { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .status-rejected { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Credit Card Approval Prediction</h2>
        <p>Fill out the application details below to run the predictive model evaluation.</p>
    </div>

    <form id="predictionForm">
        <div class="form-grid">
            
            <div class="form-group">
                <label>Gender</label>
                <select name="GENDER">
                    <option value="1">FEMALE</option>
                    <option value="0">MALE</option>
                </select>
            </div>

            <div class="form-group">
                <label>Own Car Or Not</label>
                <select name="OWN_CAR">
                    <option value="1">YES</option>
                    <option value="0">NO</option>
                </select>
            </div>

            <div class="form-group">
                <label>Own Real State</label>
                <select name="OWN_REALTY">
                    <option value="1">YES</option>
                    <option value="0">NO</option>
                </select>
            </div>

            <div class="form-group">
                <label>Total Anual Income ($)</label>
                <input type="number" name="INCOME" value="50000" required>
            </div>

            <div class="form-group">
                <label>Type Of Income</label>
                <select name="INCOME_TYPE">
                    <option value="Pensioner">Pensioner</option>
                    <option value="Working">Working</option>
                    <option value="Commercial associate">Commercial associate</option>
                    <option value="State servant">State servant</option>
                </select>
            </div>

            <div class="form-group">
                <label>Education</label>
                <select name="EDUCATION">
                    <option value="Higher education">Higher education</option>
                    <option value="Secondary / secondary special">Secondary / secondary special</option>
                    <option value="Incomplete higher">Incomplete higher</option>
                    <option value="Lower secondary">Lower secondary</option>
                </select>
            </div>

            <div class="form-group">
                <label>Family Status</label>
                <select name="FAMILY_STATUS">
                    <option value="Married">Married</option>
                    <option value="Single / not married">Single / not married</option>
                    <option value="Civil marriage">Civil marriage</option>
                    <option value="Separated">Separated</option>
                    <option value="Widow">Widow</option>
                </select>
            </div>

            <div class="form-group">
                <label>Type Of Housing</label>
                <select name="HOUSING_TYPE">
                    <option value="House / apartment">House / apartment</option>
                    <option value="With parents">With parents</option>
                    <option value="Municipal apartment">Municipal apartment</option>
                    <option value="Rented apartment">Rented apartment</option>
                </select>
            </div>

            <div class="form-group">
                <label>Days Birth (Age in Days)</label>
                <input type="number" step="any" name="DAYS_BIRTH" value="-12000" required>
            </div>

            <div class="form-group">
                <label>Days Employed</label>
                <input type="number" step="any" name="DAYS_EMPLOYED" value="-2000" required>
            </div>

            <div class="form-group">
                <label>Family Members</label>
                <input type="number" name="FAMILY_MEMBERS" value="2" required>
            </div>

            <div class="form-group">
                <label>EMI Paid Off</label>
                <input type="number" name="EMI_PAID" value="4" required>
            </div>

            <div class="form-group">
                <label>EMI Of Pastdues</label>
                <input type="number" name="EMI_PASTDUE" value="1" required>
            </div>

            <div class="form-group">
                <label>Number Of Loans</label>
                <input type="number" name="NO_LOANS" value="2" required>
            </div>

            <div class="btn-container">
                <button type="submit">Predict Status</button>
            </div>

            <div id="result-card"></div>

        </div>
    </form>
</div>

<script>
    document.getElementById('predictionForm').addEventListener('submit', function(event) {
        // CRITICAL: This line completely stops the browser from jumping to the raw text screen!
        event.preventDefault(); 
        
        const resultCard = document.getElementById('result-card');
        const formData = new FormData(this);
        
        // Show processing state
        resultCard.className = 'status-loading';
        resultCard.style.display = 'block';
        resultCard.innerText = "Analyzing data parameters...";

        // Send the data using background fetch
        fetch('/predict', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            resultCard.innerText = data.prediction_text;
            
            // Dynamically change colors based on what the model returns!
            if (data.status === 'approved') {
                resultCard.className = 'status-approved';
            } else if (data.status === 'rejected') {
                resultCard.className = 'status-rejected';
            } else {
                resultCard.className = 'status-loading';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            resultCard.className = 'status-rejected';
            resultCard.innerText = "An error occurred connecting to the model server.";
        });
    });
</script>

</body>
</html>
