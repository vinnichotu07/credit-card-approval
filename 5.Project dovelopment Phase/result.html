<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; text-align: center; padding-top: 50px; }
        .result-box { background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a365d; }
        p { font-size: 18px; color: #4a5568; margin: 20px 0; font-weight: bold; }
        a { display: inline-block; padding: 10px 20px; background-color: #008cff; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; }
        a:hover { background-color: #0077d6; }
    </style>
</head>
<body>

<div class="result-box">
    <h1>Prediction Result</h1>
    <p>{{ prediction_text }}</p>
    <br>
    <a href="/">Go Back</a>
</div>

</body>
</html>
